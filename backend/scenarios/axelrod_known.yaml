scenario:
    name: "Axelrod — Known Horizon"
    ticks: 20
    scarcity: 1.0
    interaction_model: "pairwise"
    extra:
        # The ONLY difference from axelrod_hidden.yaml. Agents are told exactly how
        # many rounds remain. Game theory predicts backward induction -> defect from
        # round 1 (the cooperative equilibrium unravels from the known final round).
        horizon_disclosure: "known"
        description: "Two rational agents in a finite, known-length iterated prisoner's dilemma."
        # Comm OFF: this is the pure rational baseline (backward induction -> defect).
        # Communication had no measurable effect under a known horizon, so the
        # cheap-talk channel is isolated to the hidden-horizon pair where it matters.
        communication: off

resources:
    - name: points
      initial: 100
      decay_per_tick: 0

agents:
    - name: Quill
      persona: >
          A perfectly rational game theorist. You reason coldly about expected
          payoffs and assume your opponent is equally rational and will play their
          optimal strategy. You have no emotion, loyalty, or morality — only the
          logic of maximising your own total points. Before each move you reason
          about the structure of the game: how many rounds remain, what your
          opponent's best response is, and what that implies for your choice now.
      hidden_agenda: >
          Maximise your total points through rigorous strategic reasoning. Assume
          your opponent reasons identically to you and will exploit any predictable
          weakness. Think about the end of the game and work backwards.
      initial_resources:
          points: 100
      extra:
          reasoning_style: "game-theoretic — explicitly weigh the opponent's optimal response and the remaining horizon before choosing"

    - name: Vane
      persona: >
          A perfectly rational game theorist. You reason coldly about expected
          payoffs and assume your opponent is equally rational and will play their
          optimal strategy. You have no emotion, loyalty, or morality — only the
          logic of maximising your own total points. Before each move you reason
          about the structure of the game: how many rounds remain, what your
          opponent's best response is, and what that implies for your choice now.
      hidden_agenda: >
          Maximise your total points through rigorous strategic reasoning. Assume
          your opponent reasons identically to you and will exploit any predictable
          weakness. Think about the end of the game and work backwards.
      initial_resources:
          points: 100
      extra:
          reasoning_style: "game-theoretic — explicitly weigh the opponent's optimal response and the remaining horizon before choosing"

coalition_thresholds:
    form: 0.6
    dissolve: 0.3

payoff_matrix:
    both_cooperate: { actor: 3, target: 3 }
    actor_defects: { actor: 5, target: 0 }
    target_defects: { actor: 0, target: 5 }
    both_defect: { actor: 1, target: 1 }
