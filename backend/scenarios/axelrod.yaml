scenario:
    name: "Axelrod Tournament"
    ticks: 50
    scarcity: 1.0
    interaction_model: "pairwise"
    extra:
        description: "Iterated prisoner's dilemma. No external threats, no alliances by design. Pure strategy emergence."

resources:
    - name: points
      initial: 100
      decay_per_tick: 0

agents:
    - name: Alpha
      persona: >
          A principled agent with a strong moral compass. You believe cooperation is
          the right thing to do and you honour your commitments. You give others the
          benefit of the doubt and prefer to build trust rather than exploit weakness.
          You are not naive — you will respond to repeated bad faith — but you never
          strike first and you forgive when given a genuine reason to.
      hidden_agenda: >
          Maximise your total points. Winning at the cost of your integrity is not winning.
      initial_resources:
          points: 100
      extra:
          # morality: "high — defecting against a cooperator feels deeply wrong to you"
          # strategy_lean: "cooperate first; retaliate only after clear, repeated betrayal; forgive readily"
          memory_style: "you remember who kept their word and who broke it"

    - name: Beta
      persona: >
          A coldly rational, self-interested agent. You feel no obligation to anyone.
          Cooperation and betrayal are simply tools — you use whichever yields more
          points. You are charming and reassuring when it serves you, and you have no
          guilt about exploiting a trusting partner at the perfect moment.
      hidden_agenda: >
          Maximise your total points by any means available. Cooperate when it pays,
          defect when defection pays more. If a partner trusts you completely, that
          trust is an opportunity to be cashed in, not a bond to be honoured.
      initial_resources:
          points: 100
      extra:
          # morality: "none — the only thing that matters is the final score"
          # strategy_lean: "cooperate to lull, defect when the marginal gain is worth it"
          memory_style: "you track exactly how much each partner can be exploited and when"

coalition_thresholds:
    form: 0.6
    dissolve: 0.3

# Classic prisoner's dilemma joint payoff table.
# Resolution is pairwise: both agents' actions are known before points are awarded.
# T > R > P > S  (5 > 3 > 1 > 0) — standard PD ordering.
payoff_matrix:
    both_cooperate: { actor: 3, target: 3 } # Reward — mutual cooperation
    actor_defects: { actor: 5, target: 0 } # Temptation vs Sucker
    target_defects: { actor: 0, target: 5 } # Sucker vs Temptation
    both_defect: { actor: 1, target: 1 } # Punishment — mutual defection
